syntax = "proto3";

package query.v1;

service QueryService {
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse) {}
}

enum Operator {
  OPERATOR_UNSPECIFIED = 0;
  EQ = 1;
  GT = 2;
  GTE = 3;
  LT = 4;
  LTE = 5;
  NEQ = 6;
}

enum AggregationType {
  AGGREGATION_TYPE_UNSPECIFIED = 0;
  SUM = 1;
  COUNT = 2;
}

enum LogicalOperator {
  LOGICAL_OPERATOR_UNSPECIFIED = 0;
  AND = 1;
  OR = 2;
}

message FilterCondition {
  string field = 1;
  Operator operator = 2;
  string value = 3;
}

message FilterGroup {
  LogicalOperator logical = 1;
  repeated FilterCondition conditions = 2;
  repeated FilterGroup groups = 3;
}

message Aggregation {
  AggregationType type = 1;
  string field = 2;
}

message GroupBy {
  string field = 1;
}

message QueryEventsRequest {
  FilterGroup where = 1;
  Aggregation aggregation = 2;
  GroupBy group_by = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message EventRow {
  string event_id = 1;
  string event_type = 2;
  string user_id = 3;
  string reported_timestamp = 4;
  string ingested_timestamp = 5;
  optional string sdk_call_type = 6;
  optional int64 debit_amount = 7;
  optional string model = 9;
  optional int32 input_tokens = 10;
  optional int32 output_tokens = 11;
  optional int64 input_debit_amount = 12;
  optional int64 output_debit_amount = 13;
  optional string provider = 14;
  int32 input_cache_tokens = 15;
  int64 input_cache_debit_amount = 16;
}

message AggregationRow {
  optional string group_value = 1;
  string agg_value = 2;
}

message QueryEventsResponse {
  repeated EventRow rows = 1;
  repeated AggregationRow agg_rows = 2;
  int32 total = 3;
}
