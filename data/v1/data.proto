syntax = "proto3";

package data.v1;

service DataQueryService {
  rpc Query(QueryRequest) returns (QueryResponse) {}
}

enum Operator {
  OPERATOR_UNSPECIFIED = 0;
  EQ = 1;
  GT = 2;
  GTE = 3;
  LT = 4;
  LTE = 5;
  NEQ = 6;
  CONTAINS = 7;
}

enum LogicalOperator {
  LOGICAL_OPERATOR_UNSPECIFIED = 0;
  AND = 1;
  OR = 2;
}

enum UsersField {
  USERS_FIELD_UNSPECIFIED = 0;
  USERS_ID = 1;
  USERS_LAST_BILLED_TIMESTAMP = 2;
  USERS_PAYMENT_PROVIDER_USER_ID = 3;
  USERS_MODE = 4;
}

enum SessionsField {
  SESSIONS_FIELD_UNSPECIFIED = 0;
  SESSIONS_ID = 1;
  SESSIONS_SESSION_ID = 2;
  SESSIONS_USER_ID = 3;
  SESSIONS_PROCESSED = 4;
  SESSIONS_BILLED_UPTO = 5;
  SESSIONS_CREATED_AT = 6;
  SESSIONS_MODE = 7;
}

enum PaymentEventsField {
  PAYMENT_EVENTS_FIELD_UNSPECIFIED = 0;
  PAYMENT_EVENTS_ID = 1;
  PAYMENT_EVENTS_USER_ID = 2;
  PAYMENT_EVENTS_API_KEY_ID = 3;
  PAYMENT_EVENTS_MODE = 4;
  PAYMENT_EVENTS_CREDIT_AMOUNT = 5;
  PAYMENT_EVENTS_SESSION_ID = 6;
  PAYMENT_EVENTS_REPORTED_TIMESTAMP = 7;
  PAYMENT_EVENTS_INGESTED_TIMESTAMP = 8;
}

enum TagsField {
  TAGS_FIELD_UNSPECIFIED = 0;
  TAGS_ID = 1;
  TAGS_KEY = 2;
  TAGS_AMOUNT = 3;
}

enum ExpressionsField {
  EXPRESSIONS_FIELD_UNSPECIFIED = 0;
  EXPRESSIONS_ID = 1;
  EXPRESSIONS_KEY = 2;
  EXPRESSIONS_EXPR = 3;
}

enum MetadataField {
  METADATA_FIELD_UNSPECIFIED = 0;
  METADATA_ID = 1;
  METADATA_PAYMENT_CRON = 2;
  METADATA_PAYMENT_WEBHOOK = 3;
}

message FilterCondition {
  string field = 1;
  Operator operator = 2;
  string value = 3;
}

message FilterGroup {
  LogicalOperator logical = 1;
  repeated FilterCondition conditions = 2;
  repeated FilterGroup groups = 3;
}

message OrderBy {
  string field = 1;
  bool descending = 2;
}

message QueryRequest {
  string table = 1;
  FilterGroup where = 2;
  repeated OrderBy order_by = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message QueryResponse {
  repeated string columns = 1;
  repeated Row rows = 2;
  int32 total = 3;
}

message Row {
  repeated string values = 1;
}
