syntax = "proto3";

package event.v1;

service EventService {
  // RegisterEvent registers an event as being done by a user
  rpc RegisterEvent(RegisterEventRequest) returns (RegisterEventResponse) {}

  // StreamEvents streams events from client to server (e.g., AI token usage)
  rpc StreamEvents(stream StreamEventRequest) returns (StreamEventResponse) {}
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  SDK_CALL = 1;
  AI_TOKEN_USAGE = 2;
}

enum SDKCallType {
  SDKCallType_UNSPECIFIED = 0;
  RAW = 1;
  MIDDLEWARE_CALL = 2;
}

message RegisterEventRequest {
  EventType type = 1;
  string userId = 2;
  int32 reportedTimestamp = 3;
  oneof data {
    SDKCall sdkCall = 4;
  }
}

message SDKCall {
  SDKCallType sdkCallType = 1;

  oneof debit {
    int32 amount = 2;
    string tag = 3;
    string expr = 4; // Pricing expression (e.g., "add(mul(tag('PREMIUM'),3),250)")
  }
}

message RegisterEventResponse {
  string random = 1;
}

message StreamEventRequest {
  EventType type = 1;
  string userId = 2;
  int32 reportedTimestamp = 3;
  oneof data {
    SDKCall sdkCall = 4;
    AITokenUsage aiTokenUsage = 5;
  }
}

message AITokenUsage {
  string model = 1;
  int32 inputTokens = 2;
  int32 outputTokens = 3;

  oneof inputDebit {
    int32 inputAmount = 4;
    string inputTag = 5;
    string inputExpr = 8; // Pricing expression for input tokens
  }

  oneof outputDebit {
    int32 outputAmount = 6;
    string outputTag = 7;
    string outputExpr = 9; // Pricing expression for output tokens
  }

  optional string provider = 10;
  int32 inputCacheTokens = 11;

  oneof inputCacheDebit {
    int32 inputCacheAmount = 12;
    string inputCacheTag = 13;
    string inputCacheExpr = 14; // Pricing expression for input cache tokens
  }
}

message StreamEventResponse {
  int32 eventsProcessed = 1;
  string message = 2;
}
